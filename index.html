<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GIS Web Application</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }

    #header {
      background: #2c3e50;
      color: #fff;
      padding: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
    }

    #container {
      display: flex;
      flex: 1;
    }

    #sidebar {
      width: 300px;
      background: #f4f4f4;
      border-right: 1px solid #ccc;
      padding: 12px;
      overflow-y: auto;
    }

    #viewDiv {
      flex: 1;
    }

    .section-title {
      font-weight: 600;
      margin: 14px 0 6px;
      padding-bottom: 4px;
      border-bottom: 2px solid #2c3e50;
    }

    #searchDiv,
    #layerListDiv,
    #scaleDiv {
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <div id="header">GIS Web Application</div>

  <div id="container">
    <div id="sidebar">

      <div class="section-title">Search</div>
      <div id="searchDiv"></div>

      <div class="section-title">Layers</div>
      <div id="layerListDiv"></div>

      <div class="section-title">Scale</div>
      <div id="scaleDiv"></div>

    </div>

    <div id="viewDiv"></div>
  </div>

  <script>
    require([
      "esri/WebMap",
      "esri/views/MapView",
      "esri/widgets/Search",
      "esri/widgets/LayerList",
      "esri/widgets/Legend",
      "esri/widgets/ScaleBar",
      "esri/widgets/Compass"
    ], function (
      WebMap,
      MapView,
      Search,
      LayerList,
      Legend,
      ScaleBar,
      Compass
    ) {

      const webmapId = "a77e60b1587a41bd8c299c2558beafe5";

      const map = new WebMap({
        portalItem: {
          id: webmapId
        }
      });

      const view = new MapView({
        container: "viewDiv",
        map: map
      });

      const search = new Search({
        view: view,
        container: "searchDiv"
      });

      const layerList = new LayerList({
        view: view,
        container: "layerListDiv"
      });

      const scaleBar = new ScaleBar({
        view: view,
        unit: "dual",
        container: "scaleDiv"
      });

      const compass = new Compass({
        view: view
      });

      view.ui.add(compass, "top-left");

      const legend = new Legend({
        view: view
      });

      view.ui.add(legend, "bottom-right");

    });
  </script>

</body>
</html>
